---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage-ui
  namespace: garage-ui
spec:
  values:
    config:
      garage:
        endpoint: "http://garage.garage.svc:3900"
        admin_endpoint: "http://garage.garage.svc:3903"
        admin_token: "${garage_admin_token}"
        region: garage
      server:
        port: 8080
        environment: development
      auth:
        admin:
          enabled: true
          username: "admin"
          password: ${garage_admin_password}
        oidc:
          enabled: false
      logging:
        level: info
        format: json
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi
