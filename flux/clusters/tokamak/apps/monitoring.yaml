---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: monitoring
spec:
  values:
    vmsingle:
      spec:
        retentionPeriod: "2" # in months
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        storage:
          storageClassName: "${default_storage_class}"
          resources:
            requests:
              storage: 50Gi

    vmagent:
      spec:
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1028Mi

    vmalert:
      spec:
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
          limits:
            memory: 128Mi
        configReloaderResources:
          requests:
            cpu: 10m
            memory: 25Mi
          limits:
            memory: 64Mi

    alertmanager:
      spec:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
        configReloaderResources:
          requests:
            cpu: 10m
            memory: 25Mi
          limits:
            memory: 64Mi

    kube-state-metrics:
      resources:
        requests:
          cpu: 20m
          memory: 128Mi
        limits:
          memory: 256Mi

    prometheus-node-exporter:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi

    victoria-metrics-operator:
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
      operator:
        disable_prometheus_converter: true

    grafana:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      grafana.ini:
        plugins:
          plugin_admin_enabled: false
      deploymentStrategy:
        type: Recreate
        rollingUpdate: null
      persistence:
        enabled: true
        storageClassName: "${default_storage_class}"
        size: 5Gi
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      route:
        main:
          enabled: true
          hostnames:
            - monitoring.${cilium_domain}
          parentRefs:
            - name: envoy-gateway-internal
              namespace: envoy-gateway-system
