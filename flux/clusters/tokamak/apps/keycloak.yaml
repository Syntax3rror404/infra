---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  values:
    podSecurityContext: 
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    keycloak:
      cache:
        type: local

    extraEnv:
      - name: MALLOC_ARENA_MAX
        value: "2"

    httpRoute:
      enabled: true
      hostnames:
        - auth.${external_domain}
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: envoy-gateway-external
          namespace: envoy-gateway-system

    adminHttpRoute:
      enabled: true
      hostnames:
        - auth-admin.${internal_domain}
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: envoy-gateway-internal
          namespace: envoy-gateway-system

    mariadbOperator:
      enabled: true
      database: keycloak
      username: keycloak
      password: "${keycloak_mariadb_password}"
      useExisting:
        enabled: true
        namespace: mariadb-prod
        mariaDbRef: mariadb-prod

    admin:
      username: admin
      password: "${keycloak_admin_password}"

    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists

    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"