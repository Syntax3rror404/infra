---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  values:
    nextcloud:
      host: nextcloud.${external_domain}
      username: admin
      password: ${nextcloud_admin_password}

      securityContext:
        runAsUser: 33
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

      phpConfigs:
        zz-pm.conf: |
          [www]
          pm = dynamic
          pm.max_children = 128
          pm.start_servers = 32
          pm.min_spare_servers = 32
          pm.max_spare_servers = 96

        zz-php.ini: |
          memory_limit = 1024M
          upload_max_filesize = 16G
          post_max_size = 16G
          max_execution_time = 3600
          max_input_time = 3600
          output_buffering = Off
          opcache.enable = 1
          opcache.enable_cli = 1
          opcache.interned_strings_buffer = 32
          opcache.max_accelerated_files = 20000
          opcache.memory_consumption = 256
          opcache.save_comments = 1
          opcache.revalidate_freq = 60
          opcache.jit = 1255
          opcache.jit_buffer_size = 128M
          apc.enable_cli = 1
          apc.shm_size = 256M

      configs:
        custom-overwrite.config.php: |-
          <?php
          $CONFIG = array (
            'overwrite.cli.url' => 'https://nextcloud.nextcloud.svc.cluster.local',
            'overwriteprotocol' => 'https',
          );

        custom.config.php: |
          <?php
            $CONFIG = array(
              'check_data_directory_permissions' => false, # https://docs.nextcloud.com/server/latest/admin_manual/configuration_server/
              'allow_local_remote_servers' => true,
            );

        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '10.0.0.0/8',
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
          );

        domains.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_domains' =>
              array (
              0 => '192.168.35.*',
              1 => 'nextcloud.tokamak.labza',
              2 => 'nextcloud.menofgaming.de',
              3 => 'rancher.tokamak.labza',
              4 => 'nextcloud.tokamak.labza',
              )
          );

        logging.config.php: |-
          <?php
          $CONFIG = array (
            'log_type' => 'file',
            'logfile' => 'nextcloud.log',
            'loglevel' => 2,
            'logdateformat' => 'F d, Y H:i:s'
            );

        db.config.php: |-
          <?php
          $CONFIG['dbhost'] = 'mariadb-prod-internal.mariadb-prod.svc';

    persistence:
      enabled: true
      size: 500Gi
      storageClass: "longhorn-prod"
      accessMode: ReadWriteOnce

    image:
      flavor: fpm

    cronjob:
      enabled: true
      type: cronjob
      cronjob:
        successfulJobsHistoryLimit: 1
        failedJobsHistoryLimit: 1
        securityContext:
          runAsUser: 33
          runAsGroup: 101
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - nextcloud
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - app
                topologyKey: kubernetes.io/hostname

    nginx:
      enabled: true
      image:
        repository: nginxinc/nginx-unprivileged
        tag: alpine
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
      securityContext:
        runAsUser: 33
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

    externalDatabase:
      enabled: true
      type: mysql
      host: mariadb-prod-internal.mariadb-prod.svc
      user: nextcloud
      password: "${nextcloud_mariadb_password}"
      database: nextcloud

    #externalDatabase:
    #  enabled: true
    #  type: mysql
    #  host: nextcloud-mariadb.svc
    #  user: nextcloud
    #  password: "${nextcloud_mariadb_password}"
    #  database: nextcloud
    #
    mariadb:
      enabled: false
      primary:
        livenessProbe:
          enabled: false
        readinessProbe:
          enabled: false
        persistence:
          enabled: true
          storageClass: "longhorn-prod"
      auth:
        database: nextcloud
        username: nextcloud
        password: "${nextcloud_mariadb_password}"
        rootPassword: "${nextcloud_mariadb_root_password}"
        existingSecret: ""
