---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
  namespace: garage
spec:
  values:
    deployment:
      replicaCount: 3

    persistence:
      meta:
        storageClass: "longhorn-prod"
        size: 500Mi
      data:
        storageClass: "longhorn-prod"
        size: 5Gi

    securityContext:
      allowPrivilegeEscalation: false

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
              name: garage
            patch: |
              - op: add
                path: /spec/ports/-
                value:
                  name: admin
                  port: 3903
                  targetPort: 3903
                  protocol: TCP
