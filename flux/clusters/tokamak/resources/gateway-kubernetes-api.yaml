---
# Allow HTTPRoute in kube-system to reference the kubernetes Service in default
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: kube-apiserver-gateway
  namespace: default
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: kube-system
  to:
  - group: ""
    kind: Service
    name: kubernetes
---
# Trust the cluster CA when Envoy connects to the kube-apiserver backend
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: kube-apiserver
  namespace: default
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: kubernetes
    sectionName: https
  validation:
    caCertificateRefs:
    - group: ""
      kind: ConfigMap
      name: kube-root-ca.crt
    hostname: kubernetes.default.svc.cluster.local
---
# Use same protocol as client so HTTP/1.1 Upgrade (WebSocket/exec/port-forward) passes through
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: kube-apiserver
  namespace: kube-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: kube-apiserver
  useClientProtocol: true
---
# Route to the kube-apiserver
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kube-apiserver
  namespace: kube-system
spec:
  parentRefs:
  - name: envoy-gateway-external
    namespace: envoy-gateway-system
  hostnames:
  - k8s.${external_domain}
  rules:
  - backendRefs:
    - name: kubernetes
      namespace: default
      port: 443
---
# Block all requests without a valid Keycloak JWT — unauthenticated traffic never reaches the apiserver
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: kube-apiserver
  namespace: kube-system
spec:
  mergeType: StrategicMerge
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: kube-apiserver
  jwt:
    providers:
    - name: keycloak
      issuer: "https://auth.${external_domain}/realms/mog"
      audiences:
      - kubernetes
      remoteJWKS:
        uri: "https://auth.${external_domain}/realms/mog/protocol/openid-connect/certs"
