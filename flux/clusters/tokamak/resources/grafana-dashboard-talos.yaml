---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-talos
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  talos-hardware-monitoring.json: |
    {
      "uid": "sensor-metrics-dashboard",
      "title": "Talos Cluster Hardware Monitoring",
      "description": "Hardware monitoring for the tokamak bare metal cluster",
      "refresh": "30s",
      "schemaVersion": 42,
      "version": 1,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "tags": [
        "talos",
        "hardware",
        "bare-metal",
        "cluster"
      ],
      "panels": [
        {
          "id": 2,
          "title": "Nodes",
          "type": "stat",
          "datasource": {
            "type": "datasource",
            "uid": "VictoriaMetrics"
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "datasource",
                "uid": "VictoriaMetrics"
              },
              "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Ready",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "datasource",
                "uid": "VictoriaMetrics"
              },
              "expr": "count(kube_node_info)",
              "legendFormat": "Total",
              "refId": "B"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "title": "Avg CPU Usage",
          "type": "stat",
          "datasource": {
            "type": "datasource",
            "uid": "VictoriaMetrics"
          },
          "gridPos": {
            "x": 4,
            "y": 0,
            "w": 3,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "datasource",
                "uid": "VictoriaMetrics"
              },
              "expr": "avg(1 - avg by(instance)(irate(node_cpu_seconds_total{mode=\"idle\"}[5m])))",
              "legendFormat": "CPU",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.7
                  },
                  {
                    "color": "red",
                    "value": 0.9
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "title": "Memory",
          "type": "stat",
          "datasource": {
            "type": "datasource",
            "uid": "VictoriaMetrics"
          },
          "gridPos": {
            "x": 7,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "datasource",
                "uid": "VictoriaMetrics"
              },
              "expr": "sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "datasource",
                "uid": "VictoriaMetrics"
              },
              "expr": "sum(node_memory_MemTotal_bytes)",
              "legendFormat": "Total",
              "refId": "B"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 300000000000.0
                  },
                  {
                    "color": "red",
                    "value": 350000000000.0
                  }
                ]
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Total"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "text"
                    }
                  }
                ]
              }
            ]
          }
        },
