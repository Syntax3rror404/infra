---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: vodafone-router
  namespace: envoy-gateway-system
spec:
  endpoints:
    - ip:
        address: "192.168.100.1"
        port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vodafone
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: envoy-gateway-external
      namespace: envoy-gateway-system
  hostnames:
    - vodafone.${external_domain}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: vodafone-router
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: vodafone
  namespace: envoy-gateway-system
spec:
  mergeType: StrategicMerge
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vodafone
  oidc:
    provider:
      issuer: "https://auth.${external_domain}/realms/mog"
      authorizationEndpoint: "https://auth.${external_domain}/realms/mog/protocol/openid-connect/auth"
      tokenEndpoint: "https://auth.${external_domain}/realms/mog/protocol/openid-connect/token"
    clientID: "${oauth2_proxy_clientID}"
    clientSecret:
      name: sso-oidc-secret
    redirectURL: "https://vodafone.${external_domain}/oauth2/callback"
    refreshToken: true
