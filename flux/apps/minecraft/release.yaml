---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: minecraft
  namespace: minecraft

spec:
  interval: 12h
  url: "https://syntax3rror404.github.io/helm-charts/charts"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: minecraft
spec:
  interval: 1h
  chart:
    spec:
      chart: minecraft
      version: "1.x.x"
      sourceRef:
        kind: HelmRepository
        name: minecraft
        namespace: minecraft