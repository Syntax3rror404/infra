---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: minecraft
  namespace: minecraft
spec:
  interval: ${helm_source_interval}
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    semver: ">=1.0.0 <2.0.0"
  url: oci://ghcr.io/syntax3rror404/helm-charts/minecraft
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: minecraft
spec:
  interval: ${helm_release_interval}
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: minecraft
    namespace: minecraft