# ---
# apiVersion: source.toolkit.fluxcd.io/v1
# kind: GitRepository
# metadata:
#   name: tekton-operator
#   namespace: tekton-operator
# spec:
#   interval: 24h
#   url: https://github.com/tektoncd/operator
#   ref:
#     # semver uses tag
#     semver: ">=0.77.0 <1.0.0"
#   ignore: |
#     # exclude all
#     /*
#     # include charts directory
#     !/charts
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tekton-operator
  namespace: tekton-operator
spec:
  interval: 24h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  url: oci://ghcr.io/tektoncd/operator/charts/tekton-operator
  ref:
    semver: ">=0.80.0 <1.0.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tekton-operator
  namespace: tekton-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tekton-operator
    namespace: tekton-operator
  values:
    operator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
    webhook:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
    podSecurityContext:
      fsGroup: 2000
      runAsUser: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL


