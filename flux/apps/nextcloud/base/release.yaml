---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: ${helm_source_interval}
  timeout: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  # verify:
  #   provider: cosign
  ref:
    semver: "9.x.x"
  url: oci://ghcr.io/nextcloud/helm/nextcloud
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: ${helm_release_interval}
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: nextcloud
    namespace: nextcloud
