---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: garage-ui
  namespace: garage-ui
spec:
  interval: 24h
  url: https://helm.noste.dev
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage-ui
  namespace: garage-ui
spec:
  interval: 1h
  chart:
    spec:
      chart: garage-ui
      version: ">=0.1.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: garage-ui
        namespace: garage-ui
