---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: teamspeak
  namespace: teamspeak
spec:
  interval: 12h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    semver: ">=1.0.0 <2.0.0"
  url: oci://ghcr.io/syntax3rror404/helm-charts/teamspeak
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teamspeak
  namespace: teamspeak
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: teamspeak
    namespace: teamspeak