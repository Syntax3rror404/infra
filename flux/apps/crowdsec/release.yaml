---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: crowdsec
  namespace: crowdsec
spec:
  interval: ${helm_source_interval}
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    semver: ">=0.24.0 <1.0.0"
  url: oci://ghcr.io/crowdsecurity/helm-charts/crowdsec
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: crowdsec
spec:
  interval: ${helm_release_interval}
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: crowdsec
    namespace: crowdsec
  values:
    # Talos uses containerd (default is docker)
    container_runtime: containerd

    config:
      scenarios:
        custom-http-ai-user-agent.yaml: |
          name: custom/http-ai-user-agent
          description: Detect usage of AI User Agent
          type: trigger
          # len(#) > 4 excludes overly generic single-word list entries (e.g. "Code")
          # that would false-positive on unrelated user agents via the "contains" match.
          # auth.${external_domain} (Keycloak) is excluded: it's auth infrastructure,
          # not crawlable content, so blocking AI-labeled UAs there has no anti-scraping
          # value but risks locking out legitimate OIDC clients (e.g. kubectl).
          filter: evt.Meta.log_type in ["http_access-log", "http_error-log"] and evt.Meta.target_fqdn != "auth.${external_domain}" and any(File("ai_user_agents.txt"), {len(#) > 4 and Upper(evt.Meta.http_user_agent) contains Upper(#)})
          data:
            - source_url: https://raw.githubusercontent.com/ai-robots-txt/ai.robots.txt/refs/heads/main/haproxy-block-ai-bots.txt
              dest_file: ai_user_agents.txt
              type: string
          labels:
            confidence: 2
            spoofable: 1
            type: scan
            classification:
              - attack.T1595
            behavior: http:scan
            label: AI User Agent
            service: http
            remediation: true
      # Custom parser whitelist: exempt SUCCESSFUL kube-apiserver traffic from the
      # generic behavioral scan scenarios (http-probing, http-crawl-non_statics, …).
      # The k8s.${external_domain} HTTPRoute is hard-gated by a mandatory Keycloak
      # JWT SecurityPolicy (see resources/gateway-kubernetes-api.yaml) + apiserver
      # RBAC — unauthenticated traffic never reaches the backend — so CrowdSec's
      # HTTP scan detection there is redundant, while a burst of legitimate
      # authenticated kubectl/Lens/k9s/flux requests can trip http-crawl-non_statics
      # and self-ban the admin's dynamic IP.
      # Only 1xx/2xx/3xx (authenticated, successful) is whitelisted, so an
      # unauthenticated attacker hammering the endpoint (401 bursts) can STILL be
      # detected. The community IP blocklist stays active regardless (IP decisions
      # are independent of this parse-time whitelist).
      parsers:
        s02-enrich:
          custom-kube-apiserver-whitelist.yaml: |
            name: custom/kube-apiserver-whitelist
            description: "Whitelist authenticated kube-apiserver traffic (JWT-gated route)"
            filter: "evt.Meta.service == 'http' && evt.Meta.log_type in ['http_access-log', 'http_error-log'] && evt.Meta.target_fqdn == 'k8s.${external_domain}'"
            whitelist:
              reason: "kube-apiserver protected by mandatory Keycloak JWT + RBAC; exempt successful admin traffic from behavioral scan scenarios"
              expression:
                - evt.Meta.http_status matches '^[123]'
      # Mirrors current `cscli console status` (manual/custom/tainted/context
      # were already enabled imperatively) + turns on console_management so
      # decisions assigned to this instance via the console get pulled too.
      console.yaml: |
        share_manual_decisions: true
        share_custom: true
        share_tainted: true
        share_context: true
        console_management: true
      # Overrides the chart image's baked-in default profiles.yaml, so the two
      # stock catch-all profiles are reproduced below our custom one.
      profiles.yaml: |
        name: ai_user_agent_short_ban
        # Fallback safety net, not the primary fix (see the auth.${external_domain}
        # exclusion on the scenario itself). Confidence is low (spoofable UA header,
        # single trigger event), so if this ever misfires on another host it should
        # self-heal in minutes instead of requiring a manual `cscli decisions delete`.
        filters:
          - Alert.GetScenario() == "custom/http-ai-user-agent"
        decisions:
          - type: ban
            duration: 5m
        on_success: break
        ---
        name: default_ip_remediation
        filters:
          - Alert.Remediation == true && Alert.GetScope() == "Ip"
        decisions:
          - type: ban
            duration: 4h
        on_success: break
        ---
        name: default_range_remediation
        filters:
          - Alert.Remediation == true && Alert.GetScope() == "Range"
        decisions:
          - type: ban
            duration: 4h
        on_success: break

    # ---------------------------------------------------------------
    # Local API: stores decisions, serves them to the Envoy bouncer.
    # ---------------------------------------------------------------
    lapi:
      env:
        # Pull the community blocklist (known-bad IPs) — free, no console needed.
        - name: DISABLE_ONLINE_API
          value: "false"
        # Register the Envoy bouncer on startup with a predefined key.
        - name: BOUNCER_KEY_envoybouncer
          valueFrom:
            secretKeyRef:
              name: crowdsec-bouncer
              key: api-key
        # Enroll this Security Engine into the CrowdSec Console dashboard.
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-bouncer
              key: enroll-key
        - name: ENROLL_INSTANCE_NAME
          value: "${cluster_name}"
        - name: ENROLL_TAGS
          value: "k8s ${cluster_name} envoy"
      persistentVolume:
        config:
          enabled: true
          storageClassName: ${default_storage_class}
          size: 500Mi
        data:
          enabled: true
          storageClassName: ${default_storage_class}
          size: 1Gi
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          memory: 200Mi
      nodeSelector:
        kubernetes.io/os: linux

    # ---------------------------------------------------------------
    # Agent: DaemonSet, parses Envoy access logs -> alerts -> decisions.
    # ---------------------------------------------------------------
    agent:
      acquisition:
        - namespace: envoy-gateway-system
          podName: envoy-*
          program: envoy
          poll_without_inotify: true
      env:
        - name: COLLECTIONS
          value: >-
            yanis-kouidri/envoy
            crowdsecurity/http-cve
            crowdsecurity/http-dos
        # Official maintained whitelist for legitimate Nextcloud client traffic.
        # Nextcloud apps (iOS/Android/desktop) generate bursts of 404s on
        # preview/thumbnail endpoints (/index.php/core/preview?fileId=…&x=…&y=…)
        # and many distinct URIs via WebDAV sync — patterns that otherwise trip
        # the generic crowdsecurity/http-probing and http-crawl-non_statics
        # scenarios and ban the user's own dynamic IP. This parser exempts only
        # those specific benign patterns (scoped by status+verb+path+args), so
        # real probing/CVE scanning of the Nextcloud host is still detected.
        - name: PARSERS
          value: crowdsecurity/nextcloud-whitelist
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          memory: 200Mi
      extraVolumes:
        - name: varlibcrowdsecdata
          emptyDir: {}
      extraVolumeMounts:
        - name: varlibcrowdsecdata
          mountPath: /var/lib/crowdsec/data
      # Download lists
      extraInitContainers:
        - name: download-ai-user-agents
          image: docker.io/curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
          command: ["sh", "-ec"]
          args:
            - |
              curl -fsSL \
                https://raw.githubusercontent.com/ai-robots-txt/ai.robots.txt/refs/heads/main/haproxy-block-ai-bots.txt \
                -o /var/lib/crowdsec/data/ai_user_agents.txt
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: varlibcrowdsecdata
              mountPath: /var/lib/crowdsec/data
