---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: crowdsec
  namespace: crowdsec
spec:
  interval: ${helm_source_interval}
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    semver: ">=0.24.0 <1.0.0"
  url: oci://ghcr.io/crowdsecurity/helm-charts/crowdsec
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: crowdsec
spec:
  interval: ${helm_release_interval}
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: crowdsec
    namespace: crowdsec
  values:
    # Talos uses containerd (default is docker)
    container_runtime: containerd

    config:
      scenarios:
        custom-http-ai-user-agent.yaml: |
          name: custom/http-ai-user-agent
          description: Detect usage of AI User Agent
          type: trigger
          filter: evt.Meta.log_type in ["http_access-log", "http_error-log"] and any(File("ai_user_agents.txt"), {Upper(evt.Meta.http_user_agent) contains Upper(#)})
          data:
            - source_url: https://raw.githubusercontent.com/ai-robots-txt/ai.robots.txt/refs/heads/main/haproxy-block-ai-bots.txt
              dest_file: ai_user_agents.txt
              type: string
          labels:
            confidence: 2
            spoofable: 1
            type: scan
            classification:
              - attack.T1595
            behavior: http:scan
            label: AI User Agent
            service: http
            remediation: true

    # ---------------------------------------------------------------
    # Local API: stores decisions, serves them to the Envoy bouncer.
    # ---------------------------------------------------------------
    lapi:
      env:
        # Pull the community blocklist (known-bad IPs) — free, no console needed.
        - name: DISABLE_ONLINE_API
          value: "false"
        # Register the Envoy bouncer on startup with a predefined key.
        # BOUNCER_KEY_<name> is honoured by the crowdsec image entrypoint.
        - name: BOUNCER_KEY_envoybouncer
          valueFrom:
            secretKeyRef:
              name: crowdsec-bouncer
              key: api-key
        # Enroll this Security Engine into the CrowdSec Console dashboard.
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-bouncer
              key: enroll-key
        - name: ENROLL_INSTANCE_NAME
          value: "${cluster_name}"
        - name: ENROLL_TAGS
          value: "k8s ${cluster_name} envoy"
      persistentVolume:
        config:
          enabled: true
          storageClassName: ${default_storage_class}
          size: 500Mi
        data:
          enabled: true
          storageClassName: ${default_storage_class}
          size: 1Gi
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          memory: 200Mi
      nodeSelector:
        kubernetes.io/os: linux

    # ---------------------------------------------------------------
    # Agent: DaemonSet, parses Envoy access logs -> alerts -> decisions.
    # ---------------------------------------------------------------
    agent:
      acquisition:
        - namespace: envoy-gateway-system
          podName: envoy-*
          program: envoy
          poll_without_inotify: true
      env:
        - name: COLLECTIONS
          value: >-
            yanis-kouidri/envoy
            crowdsecurity/http-cve
            crowdsecurity/http-dos
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          memory: 200Mi
      # Data dir as a volume (image expects this; docker_start.sh symlinks geoip
      # & collection data from /staging non-destructively, only for missing files).
      extraVolumes:
        - name: varlibcrowdsecdata
          emptyDir: {}
      extraVolumeMounts:
        - name: varlibcrowdsecdata
          mountPath: /var/lib/crowdsec/data
      # Pre-seed the AI user-agent list before the agent starts: local scenarios
      # don't auto-download their data:, so custom/http-ai-user-agent would break
      # without this. Init container writes it into the shared data volume.
      extraInitContainers:
        - name: download-ai-user-agents
          image: docker.io/curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
          command: ["sh", "-ec"]
          args:
            - |
              curl -fsSL \
                https://raw.githubusercontent.com/ai-robots-txt/ai.robots.txt/refs/heads/main/haproxy-block-ai-bots.txt \
                -o /var/lib/crowdsec/data/ai_user_agents.txt
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: varlibcrowdsecdata
              mountPath: /var/lib/crowdsec/data
