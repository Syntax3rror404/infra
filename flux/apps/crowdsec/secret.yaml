---
# CrowdSec secrets, both sourced from OpenBao via cluster-secrets
# (postBuild substitution). Store both fields under flux-tokamak/crowdsec:
#   bouncer_key        -> ${crowdsec_bouncer_key}        (self-generated random)
#   console_enroll_key -> ${crowdsec_console_enroll_key} (from app.crowdsec.net)
apiVersion: v1
kind: Secret
metadata:
  name: crowdsec-bouncer
  namespace: crowdsec
type: Opaque
stringData:
  # authenticates the Envoy bouncer to the LAPI
  api-key: "${crowdsec_bouncer_key}"
  # enrolls this Security Engine into the CrowdSec Console dashboard
  enroll-key: "${crowdsec_console_enroll_key}"
