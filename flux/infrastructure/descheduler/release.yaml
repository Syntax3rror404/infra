---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: descheduler
  namespace: kube-system
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/descheduler/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: kube-system
spec:
  interval: 1h
  historyMax: 3
  chart:
    spec:
      chart: descheduler
      version: ">=0.36.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: kube-system
  values:
    kind: CronJob
    schedule: "*/10 * * * *"

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

    # Run on control-plane nodes (system-critical workload)
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    priorityClassName: system-cluster-critical

    deschedulerPolicy:
      maxNoOfPodsToEvictPerNode: 5
      maxNoOfPodsToEvictPerNamespace: 10
      profiles:
        - name: default
          pluginConfig:
            - name: DefaultEvictor
              args:
                podProtections:
                  defaultDisabled:
                    - "PodsWithLocalStorage"
                  extraEnabled:
                    - "PodsWithPVC"
            - name: RemoveDuplicates
            - name: RemovePodsViolatingTopologySpreadConstraint
            - name: LowNodeUtilization
              args:
                # Nodes below all thresholds are "underutilized" (eviction targets)
                # Lower than chart default (20) so post-drain empty nodes trigger rebalancing
                thresholds:
                  cpu: 10
                  memory: 10
                  pods: 15
                # Nodes above any targetThreshold are "overloaded" (eviction sources)
                # Lower than chart default (50) to catch imbalance in low-utilization clusters
                targetThresholds:
                  cpu: 35
                  memory: 35
                  pods: 40
          plugins:
            balance:
              enabled:
                - RemoveDuplicates
                - RemovePodsViolatingTopologySpreadConstraint
                - LowNodeUtilization
