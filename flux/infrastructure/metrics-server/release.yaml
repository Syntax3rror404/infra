---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: ${helm_source_interval}
  url: https://kubernetes-sigs.github.io/metrics-server/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: ${helm_release_interval}
  maxHistory: 3
  chart:
    spec:
      chart: metrics-server
      version: ">=3.13.0 <4.0.0"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: kube-system
  values:
    nodeSelector: 
      node-role.kubernetes.io/control-plane: ""
    tolerations: 
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"